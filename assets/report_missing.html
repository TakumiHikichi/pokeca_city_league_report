<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>週次レポート未作成</title>
  <link rel="stylesheet" href="report_style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .missing-wrap { max-width:720px; margin:24px; }
    .missing-card { background:#fff; border:1px solid #d8d8d8; border-radius:18px; padding:28px; box-shadow:0 10px 24px rgba(0,0,0,0.08); }
    .missing-card p { line-height:1.7; }
    .missing-actions { display:flex; gap:12px; flex-wrap:wrap; margin-top:18px; }
    .missing-actions a { text-decoration:none; }
  </style>
</head>
<body>
  <main class="missing-wrap">
    <section class="missing-card">
      <h1 id="title">週次レポートはまだありません</h1>
      <p id="message">指定された週のレポートはまだ生成されていません。後日レポートが作成されたら、通常リンクへ切り替わります。</p>
      <div class="missing-actions">
        <a class="btn" id="target-link" href="#">対象URLを開く</a>
        <a class="btn secondary" href="javascript:history.back()">前のページに戻る</a>
      </div>
    </section>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const target = params.get('target') || '#';
    const label = params.get('label') || '不明';
    document.getElementById('title').textContent = `${label} の週次レポートはまだありません`;
    document.getElementById('message').textContent = `${label} の週次レポートHTMLはまだ生成されていません。生成後は通常リンク先へ切り替わります。`;
    const targetLink = document.getElementById('target-link');
    targetLink.href = target;
  </script>
</body>
</html>
